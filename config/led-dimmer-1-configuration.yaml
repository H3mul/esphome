substitutions:
  ip_address: !secret led_dimmer_node_1

esphome:
  name: led-dimmer-node-1
  friendly_name: "Kitcher Lights"
  on_boot:
    - priority: 600
      then:
        - light.control:
            id: kitchen_light
            brightness: 70%

esp8266:
  board: d1_mini

<<: !include base-esphome-configuration.yaml  

wifi:
  networks:
  - ssid: !secret wifi_ssid
    password: !secret wifi_password
  fast_connect: true
  use_address: !secret led_dimmer_node_1

output:
  - platform: esp8266_pwm
    pin: D8
    frequency: 5000 Hz
    id: pwm_output

number:
  - platform: template
    name: "Settle Time On (ms)"
    id: settle_time_on
    min_value: 0
    max_value: 10000
    initial_value: 3000
    step: 100
    optimistic: true
    unit_of_measurement: "ms"
    mode: box
  - platform: template
    name: "Settle Time Off (ms)"
    id: settle_time_off
    min_value: 0
    max_value: 10000
    initial_value: 2000
    step: 100
    optimistic: true
    unit_of_measurement: "ms"
    mode: box
  - platform: template
    name: "Delayed On (ms)"
    id: delayed_on_ms
    min_value: 0
    max_value: 10000
    initial_value: 5000
    step: 100
    optimistic: true
    unit_of_measurement: "ms"
    mode: box
  - platform: template
    name: "Delayed Off (ms)"
    id: delayed_off_ms
    min_value: 0
    max_value: 300000
    initial_value: 60000
    step: 1000
    optimistic: true
    unit_of_measurement: "ms"
    mode: box

# Example usage in a light
light:
  - platform: monochromatic
    id: kitchen_light
    output: pwm_output
    name: "Kitchen Light"
    default_transition_length: 1.5s

sensor:
  - platform: rotary_encoder
    name: "Kitchen Light Manual Dimmer"
    pin_a: D1
    pin_b: D2
    on_clockwise:
      - light.dim_relative:
          id: kitchen_light
          relative_brightness: 5%
    on_anticlockwise:
      - light.dim_relative:
          id: kitchen_light
          relative_brightness: -5%

binary_sensor:    
  - platform: gpio
    pin: D5
    name: "Kitchen Light Motion Sensor"
    id: led_motion_sensor
    filters:
      - settle: !lambda |-
            if (id(kitchen_light).current_values.is_on()) {
              return id(settle_time_on).state;
            } else {
              return id(settle_time_off).state;
            }
      - delayed_on_off:
          time_on: !lambda |-
            if (id(kitchen_light).current_values.is_on()) {
              return 0;
            } else {
              return id(delayed_on_ms).state;
            }
          time_off: !lambda |-
            if (id(kitchen_light).current_values.is_on()) {
              return id(delayed_off_ms).state;
            } else {
              return 0;
            }

  - platform: gpio
    pin:
      number: D3
      inverted: true
    name: "Kitchen Light Manual Push Button"
    id: toggle_led
    on_multi_click:
      - timing:
          - ON for at most 0.5s
          - OFF for at least 0.2s
        then:
          light.toggle: kitchen_light

      - timing:
          - ON for at least 1s
        then:
          - homeassistant.event:
              event: esphome.kitchen_button_long_pressed
