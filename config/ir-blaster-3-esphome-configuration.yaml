esphome:
  name: ir-blaster-3

esp8266:
  board: esp8285

substitutions:
  command_repeats: "1"

<<: !include base-esphome-configuration.yaml

wifi:
  networks:
  - ssid: !secret wifi_ssid
    password: !secret wifi_password
  fast_connect: true
  use_address: !secret ir_blaster_3_ip

remote_receiver:
  pin:
    number: GPIO14
    inverted: true
  dump: all

remote_transmitter:
  pin:
    number: GPIO4
  carrier_duty_percent: 50%

button:
  - platform: template
    name: "Stars Power"
    on_press:
      remote_transmitter.transmit_nec:
        address: 0xFF00
        command: 0xBA45
        command_repeats: $command_repeats

  - platform: template
    name: "Stars Toggle Aurora"
    on_press:
      remote_transmitter.transmit_nec:
        address: 0xFF00
        command: 0xB946
        command_repeats: $command_repeats

  - platform: template
    name: "Stars Toggle Laser"
    on_press:
      remote_transmitter.transmit_nec:
        address: 0xFF00
        command: 0xB847
        command_repeats: $command_repeats

  - platform: template
    name: "Stars Red"
    on_press:
      remote_transmitter.transmit_nec:
        address: 0xFF00
        command: 0xBB44
        command_repeats: $command_repeats

  - platform: template
    name: "Stars Blue"
    on_press:
      remote_transmitter.transmit_nec:
        address: 0xFF00
        command: 0xE916
        command_repeats: $command_repeats

  - platform: template
    name: "Stars Green"
    on_press:
      remote_transmitter.transmit_nec:
        address: 0xFF00
        command: 0xBC43
        command_repeats: $command_repeats

  - platform: template
    name: "Stars White"
    on_press:
      remote_transmitter.transmit_nec:
        address: 0xFF00
        command: 0xF20D
        command_repeats: $command_repeats

  - platform: template
    name: "Brightness Up"
    on_press:
      remote_transmitter.transmit_nec:
        address: 0xFF00
        command: 0xE718
        command_repeats: $command_repeats
        
  - platform: template
    name: "Brightness Down"
    on_press:
      remote_transmitter.transmit_nec:
        address: 0xFF00
        command: 0xE31C
        command_repeats: $command_repeats
