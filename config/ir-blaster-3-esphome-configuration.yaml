esphome:
  name: ir-blaster-3

esp8266:
  board: esp8285

substitutions:
  command_repeats: "1"

<<: !include base-esphome-configuration.yaml

time:
  - platform: sntp
    id: sntp_time

wifi:
  networks:
  - ssid: !secret wifi_ssid
    password: !secret wifi_password
  fast_connect: true
  use_address: !secret ir_blaster_3_ip

script:
  - id: correct_power_state
    mode: restart
    then:
      - if:
          condition:
            lambda: |-
              return id(stars_device_power).state != id(light_detected).state;
          then:
            - button.press: stars_power_button
            
  - id: correct_power_state_on
    mode: restart
    then:
      - if:
          condition:
            lambda: |-
              return !id(light_detected).state;
          then:
            - button.press: stars_power_button
            
  - id: correct_power_state_off
    mode: restart
    then:
      - if:
          condition:
            lambda: |-
              return id(light_detected).state;
          then:
            - button.press: stars_power_button

remote_receiver:
  pin:
    number: GPIO14
    inverted: true
  dump: all
  on_nec:
    then:
      - if:
          condition:
            switch.is_on: dump_receiver
          then:
            - text_sensor.template.publish:
                id: latest_ir_code
                state: !lambda |-
                  char buffer[50];
                  sprintf(buffer, "NEC: Address=0x%04X, Command=0x%04X", x.address, x.command);
                  return (std::string)buffer;
            - text_sensor.template.publish:
                id: latest_ir_code_timestamp
                state: !lambda |-
                  return id(sntp_time).now().strftime("%Y-%m-%d %H:%M:%S");

number:
  - platform: template
    name: "Light Sensor Sensitivity"
    id: light_sensitivity
    min_value: 0.0
    max_value: 1.0
    initial_value: 0.75
    step: 0.01
    optimistic: true
    restore_value: true
    mode: slider

  - platform: template
    name: "Feedback Correction Delay"
    id: feedback_delay
    min_value: 0
    max_value: 10000
    initial_value: 500 
    step: 500
    unit_of_measurement: "ms"
    optimistic: true
    restore_value: true
    mode: box

switch:
  - platform: template
    name: "Stars Power Feedback Loop"
    id: feedback_loop_enabled
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - script.execute: correct_power_state
    turn_off_action:
      - script.execute: correct_power_state

  - platform: template
    name: "Stars Power"
    id: stars_device_power
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - script.execute: correct_power_state_on
    turn_off_action:
      - script.execute: correct_power_state_off

  - platform: template
    name: "Enable IR Dump"
    id: dump_receiver
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF

text_sensor:
  - platform: template
    name: "Latest IR Code"
    id: latest_ir_code

  - platform: template
    name: "Latest IR Code Received At"
    id: latest_ir_code_timestamp

binary_sensor:
  - platform: template
    name: "Light Detected"
    id: light_detected
    lambda: |-
      if (id(light_sensor_raw).state < id(light_sensitivity).state) {
        return true;
      } else {
        return false;
      }
    on_state:
      - delay: !lambda "return id(feedback_delay).state;"
      - if:
          condition:
            switch.is_on: feedback_loop_enabled
          then:
            - script.execute: correct_power_state

sensor:
  - platform: adc
    pin: A0
    internal: true
    name: "Light Sensor Raw"
    id: light_sensor_raw
    update_interval: 100ms

remote_transmitter:
  pin:
    number: GPIO4
  carrier_duty_percent: 50%

button:
  - platform: template
    name: "Stars Toggle Power"
    id: stars_power_button
    on_press:
      remote_transmitter.transmit_nec:
        address: 0xFF00
        command: 0xBA45
        command_repeats: $command_repeats

  - platform: template
    name: "Stars Toggle Aurora"
    on_press:
      remote_transmitter.transmit_nec:
        address: 0xFF00
        command: 0xB946
        command_repeats: $command_repeats

  - platform: template
    name: "Stars Toggle Laser"
    on_press:
      remote_transmitter.transmit_nec:
        address: 0xFF00
        command: 0xB847
        command_repeats: $command_repeats

  - platform: template
    name: "Stars Red"
    on_press:
      remote_transmitter.transmit_nec:
        address: 0xFF00
        command: 0xBB44
        command_repeats: $command_repeats

  - platform: template
    name: "Stars Blue"
    on_press:
      remote_transmitter.transmit_nec:
        address: 0xFF00
        command: 0xE916
        command_repeats: $command_repeats

  - platform: template
    name: "Stars Green"
    on_press:
      remote_transmitter.transmit_nec:
        address: 0xFF00
        command: 0xBC43
        command_repeats: $command_repeats

  - platform: template
    name: "Stars White"
    on_press:
      remote_transmitter.transmit_nec:
        address: 0xFF00
        command: 0xF20D
        command_repeats: $command_repeats

  - platform: template
    name: "Stars Brightness Up"
    on_press:
      remote_transmitter.transmit_nec:
        address: 0xFF00
        command: 0xE718
        command_repeats: $command_repeats
        
  - platform: template
    name: "Stars Brightness Down"
    on_press:
      remote_transmitter.transmit_nec:
        address: 0xFF00
        command: 0xE31C
        command_repeats: $command_repeats
